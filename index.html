<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Backrooms Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* VHS / CRT Scanline Effect */
        #vhs-filter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 15;
            opacity: 0.8;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; }
            50% { opacity: 0.7; }
            100% { opacity: 0.85; }
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 16;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        #stamina-container {
            width: 300px;
            height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            align-self: flex-start;
            margin-top: auto;
        }

        #stamina-bar {
            width: 100%;
            height: 100%;
            background-color: #d8c37c;
            transition: width 0.1s linear, background-color 0.2s;
        }

        #stamina-bar.exhausted {
            background-color: #cc0000;
        }

        #level-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #d8c37c;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
            text-align: right;
        }

        #key-info {
            font-size: 18px;
            margin-top: 5px;
        }

        #notification {
            position: absolute;
            top: 60px;
            right: 20px;
            color: #88ccff;
            font-size: 18px;
            text-shadow: 1px 1px 2px #000;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            color: #d8c37c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            text-align: center;
        }

        #overlay h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #d8c37c;
        }

        #overlay p {
            font-size: 18px;
            max-width: 600px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            background-color: transparent;
            color: #d8c37c;
            border: 2px solid #d8c37c;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #d8c37c;
            color: #000;
            box-shadow: 0 0 15px #d8c37c;
        }

        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Tension Overlay saat monster mendekat */
        #tension-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(180,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 6;
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* Transisi Pindah Level */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 18; /* Di bawah UI utama tapi di atas game */
            transition: opacity 1.5s ease-in-out;
        }

        /* Jumpscare Screen */
        #jumpscare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #880000;
            mix-blend-mode: color-burn;
            z-index: 99;
            display: none;
            pointer-events: none;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(10px, 10px); }
            25% { transform: translate(-10px, -10px); }
            50% { transform: translate(-10px, 10px); }
            75% { transform: translate(10px, -10px); }
            100% { transform: translate(10px, 10px); }
        }
        
        .controls-hint {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    <div id="tension-overlay"></div>
    <div id="fade-overlay"></div>
    <div id="vhs-filter"></div>
    <div id="jumpscare"></div>
    <div id="ui-layer">
        <div id="level-info">Level: 1<div id="key-info">Kunci: <span style="color:#cc0000">Terkunci</span></div></div>
        <div id="notification">Almond Water Ditemukan!</div>
        <div id="crosshair">+</div>
        <div id="stamina-container">
            <div id="stamina-bar"></div>
        </div>
    </div>

    <div id="overlay">
        <h1 id="title">THE BACKROOMS</h1>
        <p id="description">Anda terjebak. Jelajahi ruangan prosedural ini dan cari cahaya hijau untuk keluar.<br><br>Hati-hati, Anda tidak sendirian. Dengarkan suaranya.</p>
        <button id="start-btn" class="btn">Mulai Simulasi</button>
        <div class="controls-hint">W,A,S,D: Bergerak | Mouse: Lihat | Shift: Lari | F: Senter</div>
    </div>

    <script>
        // --- GAME STATE & CONFIG ---
        const config = {
            tileSize: 4,
            wallHeight: 5,
            mapSize: 30, 
            playerSpeed: 0.15,
            playerSprintSpeed: 0.28,
            staminaMax: 100,
            staminaDrain: 0.5,
            staminaRegen: 0.3,
            monsterSpeed: 0.08
        };

        let state = {
            level: 1,
            isPlaying: false,
            isDead: false,
            isTransitioning: false,
            stamina: 100,
            exhausted: false,
            mapData: [],
            exitPos: { x: 0, z: 0 },
            monsterActive: false,
            walkTimer: 0,
            flashlight: true,
            items: [], // Menyimpan Almond Water
            heartbeatTimer: 0,
            hasKey: false,
            keyObj: null,
            exitMeshObj: null,
            exitLightObj: null
        };

        let keys = { w: false, a: false, s: false, d: false, shift: false };

        // --- THREE.JS VARIABLES ---
        let scene, camera, renderer, clock;
        let mapGroup, floorMesh, ceilingMesh;
        let monster;
        let wallMaterial, wallMaterialText, floorMaterial, ceilingMaterial, exitMaterial;
        let ambientLight, pointLight;

        // Camera / Player rotation
        let pitch = 0;
        let yaw = 0;
        let roll = 0; // Untuk Camera Tilt

        // --- AUDIO VARIABLES ---
        let audioCtx, masterGain;
        let monsterPanner, monsterGain, monsterOsc1, monsterLFO;
        let ambientOsc, ambientFilter, ambientGain;

        // --- DOM ELEMENTS ---
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const staminaBar = document.getElementById('stamina-bar');
        const levelInfo = document.getElementById('level-info');
        const keyInfo = document.getElementById('key-info');
        const notification = document.getElementById('notification');
        const jumpscareDiv = document.getElementById('jumpscare');
        const tensionOverlay = document.getElementById('tension-overlay');
        const fadeOverlay = document.getElementById('fade-overlay');

        // --- INITIALIZATION ---
        window.onload = function() {
            initThreeJS();
            setupInput();
            
            startBtn.addEventListener('click', () => {
                startGame();
            });
            
            clock = new THREE.Clock();
            animate();
        };

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a14);
            scene.fog = new THREE.FogExp2(0x2a2a20, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1 : 1);
            document.getElementById('game-container').appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xfff5b6, 0.4); 
            scene.add(ambientLight);

            pointLight = new THREE.PointLight(0xfff5b6, 0.8, 15);
            camera.add(pointLight);
            scene.add(camera);

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- TEXTURE GENERATION ---
        function generateTextures(level) {
            // Hapus tekstur lama untuk mencegah kebocoran memori
            if (wallMaterial) wallMaterial.map.dispose();
            if (wallMaterialText) wallMaterialText.map.dispose();

            // Tentukan warna dinding berdasarkan level (Semakin dalam, makin gelap/merah)
            let r=216, g=195, b=124; // Base yellow
            if(level >= 3 && level <= 4) { r=160; g=170; b=140; } // Kehijauan
            else if(level >= 5) { r=160; g=100; b=100; } // Kemerahan

            function drawBaseWall(ctx) {
                ctx.fillStyle = `rgb(${r},${g},${b})`; ctx.fillRect(0, 0, 256, 256);
                for(let i=0; i<10000; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
                    ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2);
                }
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                for(let i=0; i<256; i+=32) {
                    ctx.fillRect(i, 0, 2, 256);
                }
                ctx.fillStyle = 'rgba(50, 40, 20, 0.3)';
                for(let i=0; i<256; i++) {
                    ctx.fillRect(i, 200 + Math.random()*56, 1, 56);
                }
            }

            // Dinding Biasa
            const wallCanvas = document.createElement('canvas');
            wallCanvas.width = 256; wallCanvas.height = 256;
            const ctxW = wallCanvas.getContext('2d');
            drawBaseWall(ctxW);
            const wallTex = new THREE.CanvasTexture(wallCanvas);
            wallTex.wrapS = THREE.RepeatWrapping; wallTex.wrapT = THREE.RepeatWrapping;
            wallMaterial = new THREE.MeshLambertMaterial({ map: wallTex });

            // Dinding dengan tulisan menyeramkan
            const wallTextCanvas = document.createElement('canvas');
            wallTextCanvas.width = 256; wallTextCanvas.height = 256;
            const ctxWT = wallTextCanvas.getContext('2d');
            drawBaseWall(ctxWT);
            const words = ["RUN", "NO ESCAPE", "?", "IT HEARS YOU", "DONT LOOK"];
            ctxWT.fillStyle = "rgba(100, 10, 10, 0.6)"; 
            ctxWT.font = "bold 30px 'Courier New'";
            ctxWT.translate(128, 128);
            ctxWT.rotate((Math.random() - 0.5) * 0.4);
            ctxWT.fillText(words[Math.floor(Math.random() * words.length)], -80, 0);
            ctxWT.resetTransform();

            const wallTextTex = new THREE.CanvasTexture(wallTextCanvas);
            wallMaterialText = new THREE.MeshLambertMaterial({ map: wallTextTex });

            // Jika lantai dan langit-langit belum dibuat, buat sekarang
            if (!floorMaterial) {
                const floorCanvas = document.createElement('canvas');
                floorCanvas.width = 256; floorCanvas.height = 256;
                const ctxF = floorCanvas.getContext('2d');
                ctxF.fillStyle = '#6b5c3f'; ctxF.fillRect(0, 0, 256, 256);
                for(let i=0; i<20000; i++) {
                    ctxF.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(150,130,80,0.1)';
                    ctxF.fillRect(Math.random()*256, Math.random()*256, 3, 3);
                }
                const floorTex = new THREE.CanvasTexture(floorCanvas);
                floorTex.wrapS = THREE.RepeatWrapping; floorTex.wrapT = THREE.RepeatWrapping;
                floorTex.repeat.set(config.mapSize, config.mapSize);
                floorMaterial = new THREE.MeshLambertMaterial({ map: floorTex });

                const ceilCanvas = document.createElement('canvas');
                ceilCanvas.width = 128; ceilCanvas.height = 128;
                const ctxC = ceilCanvas.getContext('2d');
                ctxC.fillStyle = '#e0e0d8'; ctxC.fillRect(0, 0, 128, 128);
                ctxC.strokeStyle = '#aaaaaa'; ctxC.lineWidth = 2;
                ctxC.strokeRect(0, 0, 128, 128);
                ctxC.fillStyle = 'rgba(100,100,80,0.2)';
                ctxC.beginPath(); ctxC.arc(Math.random()*128, Math.random()*128, 20, 0, Math.PI*2); ctxC.fill();
                const ceilTex = new THREE.CanvasTexture(ceilCanvas);
                ceilTex.wrapS = THREE.RepeatWrapping; ceilTex.wrapT = THREE.RepeatWrapping;
                ceilTex.repeat.set(config.mapSize, config.mapSize);
                ceilingMaterial = new THREE.MeshLambertMaterial({ map: ceilTex });

                exitMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.8 });
            }
        }

        // --- MAP GENERATION ---
        function generateLevel() {
            generateTextures(state.level); // Update tekstur dinding sesuai level

            if(mapGroup) scene.remove(mapGroup);
            mapGroup = new THREE.Group();
            state.items = []; 
            
            let size = Math.min(60, config.mapSize + (state.level - 1) * 5);
            config.monsterSpeed = Math.min(0.25, 0.08 + (state.level * 0.015));
            
            state.mapData = Array(size).fill().map(() => Array(size).fill(1));

            let rooms = [];
            const numRooms = Math.floor(size * size / 50);

            for (let i = 0; i < numRooms; i++) {
                let rw = Math.floor(Math.random() * 5) + 3;
                let rh = Math.floor(Math.random() * 5) + 3;
                let rx = Math.floor(Math.random() * (size - rw - 2)) + 1;
                let rz = Math.floor(Math.random() * (size - rh - 2)) + 1;

                for (let x = rx; x < rx + rw; x++) {
                    for (let z = rz; z < rz + rh; z++) {
                        state.mapData[x][z] = 0;
                    }
                }
                rooms.push({ x: Math.floor(rx + rw/2), z: Math.floor(rz + rh/2) });
            }

            for (let i = 1; i < rooms.length; i++) {
                let r1 = rooms[i-1];
                let r2 = rooms[i];
                let cx = r1.x;
                let cz = r1.z;
                while (cx !== r2.x || cz !== r2.z) {
                    if (Math.random() > 0.5) {
                        if (cx < r2.x) cx++; else if (cx > r2.x) cx--;
                    } else {
                        if (cz < r2.z) cz++; else if (cz > r2.z) cz--;
                    }
                    state.mapData[cx][cz] = 0;
                }
            }

            for(let x=2; x<size-2; x++) {
                for(let z=2; z<size-2; z++) {
                    if(state.mapData[x][z] === 0 && Math.random() < 0.05) {
                        state.mapData[x][z] = 1;
                    }
                }
            }

            const boxGeo = new THREE.BoxGeometry(config.tileSize, config.wallHeight, config.tileSize);
            for (let x = 0; x < size; x++) {
                for (let z = 0; z < size; z++) {
                    if (state.mapData[x][z] === 1) {
                        let mat = (Math.random() < 0.1) ? wallMaterialText : wallMaterial;
                        let wall = new THREE.Mesh(boxGeo, mat);
                        wall.position.set(x * config.tileSize, config.wallHeight / 2, z * config.tileSize);
                        mapGroup.add(wall);
                    }
                }
            }

            const planeGeo = new THREE.PlaneGeometry(size * config.tileSize, size * config.tileSize);
            floorMesh = new THREE.Mesh(planeGeo, floorMaterial);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set((size * config.tileSize)/2 - config.tileSize/2, 0, (size * config.tileSize)/2 - config.tileSize/2);
            mapGroup.add(floorMesh);

            ceilingMesh = new THREE.Mesh(planeGeo, ceilingMaterial);
            ceilingMesh.rotation.x = Math.PI / 2;
            ceilingMesh.position.set((size * config.tileSize)/2 - config.tileSize/2, config.wallHeight, (size * config.tileSize)/2 - config.tileSize/2);
            mapGroup.add(ceilingMesh);

            const waterGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.8, 8);
            const waterMat = new THREE.MeshLambertMaterial({ color: 0x88ccff });
            let numItems = 2 + Math.floor(state.level / 2); 
            
            for(let i=0; i < numItems; i++) {
                let placed = false;
                while(!placed) {
                    let rx = Math.floor(Math.random() * size);
                    let rz = Math.floor(Math.random() * size);
                    if(state.mapData[rx][rz] === 0) {
                        let water = new THREE.Mesh(waterGeo, waterMat);
                        water.position.set(rx * config.tileSize, 0.4, rz * config.tileSize);
                        mapGroup.add(water);
                        state.items.push(water);
                        placed = true;
                    }
                }
            }

            // Generate Key (Kunci)
            state.hasKey = false;
            if(keyInfo) keyInfo.innerHTML = 'Kunci: <span style="color:#cc0000">Terkunci</span>';
            const keyGeo = new THREE.OctahedronGeometry(0.3);
            const keyMat = new THREE.MeshBasicMaterial({ color: 0xffd700, wireframe: true });
            state.keyObj = new THREE.Mesh(keyGeo, keyMat);
            
            let keyPlaced = false;
            while(!keyPlaced) {
                let rx = Math.floor(Math.random() * size);
                let rz = Math.floor(Math.random() * size);
                // Pastikan diletakkan di ruang kosong dan bukan di area spawn/exit
                if(state.mapData[rx][rz] === 0 && 
                  (rx !== rooms[0].x || rz !== rooms[0].z) &&
                  (rx !== rooms[rooms.length-1].x || rz !== rooms[rooms.length-1].z)) {
                    state.keyObj.position.set(rx * config.tileSize, config.wallHeight/2, rz * config.tileSize);
                    mapGroup.add(state.keyObj);
                    keyPlaced = true;
                }
            }

            camera.position.set(rooms[0].x * config.tileSize, config.wallHeight * 0.6, rooms[0].z * config.tileSize);
            yaw = 0; pitch = 0; roll = 0;
            updateCameraRotation();

            let exitRoom = rooms[rooms.length - 1];
            state.exitPos = { x: exitRoom.x, z: exitRoom.z };
            let exitMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(config.tileSize/4, config.tileSize/4, config.wallHeight, 8),
                exitMaterial
            );
            exitMesh.position.set(exitRoom.x * config.tileSize, config.wallHeight/2, exitRoom.z * config.tileSize);
            
            const exitLight = new THREE.PointLight(0xff0000, 1, 10); // Start locked (Merah)
            exitLight.position.set(0, 0, 0);
            exitMesh.add(exitLight);
            exitMaterial.color.setHex(0xff0000); // Material terkunci

            state.exitMeshObj = exitMesh;
            state.exitLightObj = exitLight;
            
            mapGroup.add(exitMesh);

            scene.add(mapGroup);
            spawnMonster(size, rooms);
        }

        function spawnMonster(size, rooms) {
            if(monster) scene.remove(monster);
            
            monster = new THREE.Group();

            // Badan monster
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.2, config.wallHeight * 0.75, 8);
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0x030303 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = (config.wallHeight * 0.75) / 2;
            body.userData.baseY = body.position.y;
            monster.add(body);

            // Kepala
            const headGeo = new THREE.SphereGeometry(0.6, 8, 8);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.y = config.wallHeight * 0.75 + 0.3;
            head.userData.baseY = head.position.y;
            monster.add(head);

            // Mata Menyala
            const eyeGeo = new THREE.SphereGeometry(0.1, 4, 4);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.25, head.position.y, 0.55);
            eyeL.userData.baseY = eyeL.position.y;
            
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.25, head.position.y, 0.55);
            eyeR.userData.baseY = eyeR.position.y;
            
            monster.add(eyeL);
            monster.add(eyeR);
            
            let spawnRoom = rooms[Math.floor(Math.random() * (rooms.length - 1)) + 1];
            monster.position.set(spawnRoom.x * config.tileSize, 0, spawnRoom.z * config.tileSize);
            
            scene.add(monster);
            state.monsterActive = true;
        }

        // --- AUDIO SYSTEM ---
        function initAudio() {
            if(audioCtx) return; 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            masterGain.gain.value = 0.5;

            ambientOsc = audioCtx.createOscillator();
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.value = 60; 
            
            ambientFilter = audioCtx.createBiquadFilter();
            ambientFilter.type = 'lowpass';
            ambientFilter.frequency.value = 200;

            ambientGain = audioCtx.createGain();
            ambientGain.gain.value = 0.05;

            ambientOsc.connect(ambientFilter);
            ambientFilter.connect(ambientGain);
            ambientGain.connect(masterGain);
            ambientOsc.start();

            monsterPanner = audioCtx.createPanner();
            monsterPanner.panningModel = 'HRTF';
            monsterPanner.distanceModel = 'exponential';
            monsterPanner.refDistance = 2;
            monsterPanner.maxDistance = 50;
            monsterPanner.rolloffFactor = 1.5;

            monsterGain = audioCtx.createGain();
            monsterGain.gain.value = 0; 

            monsterOsc1 = audioCtx.createOscillator();
            monsterOsc1.type = 'square';
            monsterOsc1.frequency.value = 35;

            monsterLFO = audioCtx.createOscillator();
            monsterLFO.type = 'sine';
            monsterLFO.frequency.value = 2; 
            
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 10;
            monsterLFO.connect(lfoGain);
            lfoGain.connect(monsterOsc1.frequency);

            monsterOsc1.connect(monsterGain);
            monsterGain.connect(monsterPanner);
            monsterPanner.connect(masterGain);
            
            monsterOsc1.start();
            monsterLFO.start();
        }

        function playFootstep(isSprinting) {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(masterGain);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(isSprinting ? 80 : 60, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(isSprinting ? 0.3 : 0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Suara detak jantung saat lelah
        function playExhaustedHeartbeat() {
            if(!audioCtx || audioCtx.state !== 'running') return;
            
            // Detak pertama
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);
            osc.frequency.setValueAtTime(50, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.1);

            // Detak kedua
            let osc2 = audioCtx.createOscillator();
            let gain2 = audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(masterGain);
            osc2.frequency.setValueAtTime(60, audioCtx.currentTime + 0.15);
            osc2.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
            gain2.gain.setValueAtTime(0.4, audioCtx.currentTime + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc2.start(audioCtx.currentTime + 0.15); osc2.stop(audioCtx.currentTime + 0.3);
        }

        function playClickSound() {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        function playGulpSound() {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playJumpscareSound() {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); 
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            const lfo = audioCtx.createOscillator();
            lfo.type = 'square';
            lfo.frequency.value = 50;
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 500;
            lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
            
            gain.gain.setValueAtTime(1.0, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            
            osc.start(); lfo.start();
            osc.stop(audioCtx.currentTime + 0.5); lfo.stop(audioCtx.currentTime + 0.5);
        }

        function playWinSound() {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(masterGain);
            
            // Suara mendengung yang semakin tinggi (Portal sci-fi)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 1.5);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 1.0);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
            
            osc.start(); osc.stop(audioCtx.currentTime + 1.5);
        }

        function updateAudio() {
            if(!audioCtx || !state.isPlaying) return;

            audioCtx.listener.positionX.value = camera.position.x;
            audioCtx.listener.positionY.value = camera.position.y;
            audioCtx.listener.positionZ.value = camera.position.z;

            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            audioCtx.listener.forwardX.value = dir.x;
            audioCtx.listener.forwardY.value = dir.y;
            audioCtx.listener.forwardZ.value = dir.z;
            audioCtx.listener.upX.value = 0;
            audioCtx.listener.upY.value = 1;
            audioCtx.listener.upZ.value = 0;

            if(monster) {
                monsterPanner.positionX.value = monster.position.x;
                monsterPanner.positionY.value = monster.position.y;
                monsterPanner.positionZ.value = monster.position.z;

                let dist = camera.position.distanceTo(monster.position);
                if(dist < 30) {
                    monsterGain.gain.setTargetAtTime(1.5, audioCtx.currentTime, 0.1);
                    let beatFreq = 2 + (30 - dist) * 0.15;
                    monsterLFO.frequency.setTargetAtTime(beatFreq, audioCtx.currentTime, 0.1);
                } else {
                    monsterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5);
                }
            }
        }

        // --- INPUT & CONTROLS ---
        function setupInput() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') keys.w = true;
                if(e.code === 'KeyA') keys.a = true;
                if(e.code === 'KeyS') keys.s = true;
                if(e.code === 'KeyD') keys.d = true;
                if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = true;
                if(e.code === 'KeyF' && state.isPlaying) {
                    state.flashlight = !state.flashlight;
                    pointLight.visible = state.flashlight;
                    playClickSound();
                }
            });

            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') keys.w = false;
                if(e.code === 'KeyA') keys.a = false;
                if(e.code === 'KeyS') keys.s = false;
                if(e.code === 'KeyD') keys.d = false;
                if(e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.shift = false;
            });

            document.addEventListener('mousemove', (e) => {
                if (!state.isPlaying || state.isDead) return;
                
                const movementX = e.movementX || e.mozMovementX || e.webkitMovementX || 0;
                const movementY = e.movementY || e.mozMovementY || e.webkitMovementY || 0;

                yaw -= movementX * 0.002;
                pitch -= movementY * 0.002;

                pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
                updateCameraRotation();
            });

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement !== document.body && !state.isDead) {
                    pauseGame();
                }
            });
        }

        function updateCameraRotation() {
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, roll, 'YXZ'));
        }

        function checkCollision(x, z) {
            let gridX = Math.round(x / config.tileSize);
            let gridZ = Math.round(z / config.tileSize);
            let mapSize = state.mapData.length;
            if (gridX < 0 || gridX >= mapSize || gridZ < 0 || gridZ >= mapSize) return true;
            return state.mapData[gridX][gridZ] === 1;
        }

        // --- GAME LOGIC ---
        function startGame() {
            if(!audioCtx) initAudio();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            overlay.style.display = 'none';
            jumpscareDiv.style.display = 'none';
            tensionOverlay.style.opacity = 0;
            fadeOverlay.style.opacity = 0;
            camera.fov = 75; // Reset FOV jika berasal dari transisi
            camera.updateProjectionMatrix();
            state.isDead = false;
            state.isTransitioning = false;
            document.body.requestPointerLock();
            
            if(!state.isPlaying && state.mapData.length === 0) {
                state.level = 1;
                state.stamina = config.staminaMax;
                state.flashlight = true;
                pointLight.visible = true;
                generateLevel();
            }
            
            levelInfo.innerHTML = `Level: ${state.level}<div id="key-info">Kunci: <span style="color:${state.hasKey ? '#00ff00' : '#cc0000'}">${state.hasKey ? 'Ditemukan' : 'Terkunci'}</span></div>`;
            state.isPlaying = true;
        }

        function pauseGame() {
            if (state.isDead) return;
            state.isPlaying = false;
            overlay.style.display = 'flex';
            titleEl.innerText = "JEDA";
            descEl.innerText = "Klik untuk melanjutkan.";
            startBtn.innerText = "Lanjutkan";
        }

        function showNotification(text) {
            notification.innerText = text;
            notification.style.opacity = 1;
            setTimeout(() => {
                notification.style.opacity = 0;
            }, 2000);
        }

        function triggerJumpscare() {
            state.isPlaying = false;
            state.isDead = true;
            document.exitPointerLock();
            
            jumpscareDiv.style.display = 'block';
            playJumpscareSound();
            camera.fov = 100; 
            camera.updateProjectionMatrix();

            setTimeout(() => {
                jumpscareDiv.style.display = 'none';
                camera.fov = 75; 
                camera.updateProjectionMatrix();

                overlay.style.display = 'flex';
                titleEl.innerText = "ANDA TERTANGKAP";
                titleEl.style.color = "#cc0000";
                descEl.innerText = "Entitas itu menemukanmu di kegelapan...";
                startBtn.innerText = "Coba Lagi";
                state.mapData = []; 
            }, 600);
        }

        function winLevel() {
            if (state.isTransitioning) return;
            state.isTransitioning = true; // Kunci pergerakan normal player dan monster
            
            playWinSound();
            fadeOverlay.style.opacity = 1; 
            showNotification("MEMASUKI LEVEL BERIKUTNYA...");

            // Waktu transisi diperpanjang sedikit agar animasi warp terasa
            setTimeout(() => {
                state.isPlaying = false;
                state.level++;
                document.exitPointerLock();
                
                // Reset Kamera
                camera.fov = 75;
                camera.updateProjectionMatrix();
                roll = 0;
                updateCameraRotation();

                overlay.style.display = 'flex';
                titleEl.innerText = "LEVEL SELESAI";
                titleEl.style.color = "#00ff00";
                descEl.innerText = "Anda menemukan jalan keluar. Namun lorong ini tidak berujung...";
                startBtn.innerText = "Masuk ke Level " + state.level;
                generateLevel(); 
                state.isTransitioning = false;
            }, 2000);
        }

        function updatePlayer(delta) {
            // Efek Transisi Menang (Tersedot ke lubang/pilar)
            if (state.isTransitioning) {
                camera.fov += (150 - camera.fov) * 3 * delta;
                camera.updateProjectionMatrix();
                
                roll += 4 * delta; // Kamera berputar
                updateCameraRotation();
                
                let exitWorldX = state.exitPos.x * config.tileSize;
                let exitWorldZ = state.exitPos.z * config.tileSize;
                camera.position.x += (exitWorldX - camera.position.x) * 3 * delta;
                camera.position.z += (exitWorldZ - camera.position.z) * 3 * delta;
                
                return; // Hentikan input normal
            }

            let isMoving = keys.w || keys.a || keys.s || keys.d;
            let isSprinting = keys.shift && isMoving && !state.exhausted;

            // Logika Stamina
            if (isSprinting) {
                state.stamina -= config.staminaDrain;
                if (state.stamina <= 0) {
                    state.stamina = 0;
                    state.exhausted = true;
                    staminaBar.classList.add('exhausted');
                }
            } else {
                state.stamina += config.staminaRegen;
                if (state.stamina >= config.staminaMax) {
                    state.stamina = config.staminaMax;
                    if (state.exhausted) {
                        state.exhausted = false;
                        staminaBar.classList.remove('exhausted');
                    }
                }
            }
            staminaBar.style.width = (state.stamina / config.staminaMax * 100) + '%';

            // Logika Jantung Berdebar (Stamina menipis)
            if (state.stamina < config.staminaMax * 0.3) {
                state.heartbeatTimer += delta;
                if (state.heartbeatTimer > 0.8) { // Detak setiap 0.8 detik
                    playExhaustedHeartbeat();
                    state.heartbeatTimer = 0;
                }
            } else {
                state.heartbeatTimer = 0;
            }

            let speed = isSprinting ? config.playerSprintSpeed : config.playerSpeed;
            
            let dir = new THREE.Vector3();
            let right = new THREE.Vector3();
            dir.set(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
            right.set(Math.sin(yaw + Math.PI/2), 0, Math.cos(yaw + Math.PI/2)).normalize();

            let moveX = 0;
            let moveZ = 0;

            if (keys.w) { moveX -= dir.x; moveZ -= dir.z; }
            if (keys.s) { moveX += dir.x; moveZ += dir.z; }
            if (keys.a) { moveX -= right.x; moveZ -= right.z; }
            if (keys.d) { moveX += right.x; moveZ += right.z; }

            // Camera Tilt saat berjalan menyamping
            let targetRoll = 0;
            if (keys.a) targetRoll = 0.04;
            else if (keys.d) targetRoll = -0.04;
            roll += (targetRoll - roll) * 10 * delta; // Smoothed transition

            if (moveX !== 0 || moveZ !== 0) {
                let length = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX = (moveX/length) * speed;
                moveZ = (moveZ/length) * speed;
                
                state.walkTimer += speed;
                if (state.walkTimer > (isSprinting ? 2.0 : 3.5)) {
                    playFootstep(isSprinting);
                    state.walkTimer = 0;
                }
            } else {
                state.walkTimer = 0; 
            }

            if (isMoving) {
                const time = Date.now() * (isSprinting ? 0.015 : 0.01);
                const bobbingMuliplier = isSprinting ? 0.3 : 0.15;
                camera.position.y = config.wallHeight * 0.6 + Math.sin(time) * bobbingMuliplier;
            } else {
                camera.position.y = config.wallHeight * 0.6;
            }

            let nextX = camera.position.x + moveX;
            let nextZ = camera.position.z + moveZ;
            const r = 0.5; 

            if (!checkCollision(nextX + (moveX>0?r:-r), camera.position.z) && 
                !checkCollision(nextX, camera.position.z + r) && 
                !checkCollision(nextX, camera.position.z - r)) {
                camera.position.x = nextX;
            }
            if (!checkCollision(camera.position.x, nextZ + (moveZ>0?r:-r)) &&
                !checkCollision(camera.position.x + r, nextZ) &&
                !checkCollision(camera.position.x - r, nextZ)) {
                camera.position.z = nextZ;
            }

            for (let i = state.items.length - 1; i >= 0; i--) {
                if (camera.position.distanceTo(state.items[i].position) < 1.5) {
                    mapGroup.remove(state.items[i]);
                    state.items.splice(i, 1);
                    state.stamina = config.staminaMax;
                    state.exhausted = false;
                    staminaBar.classList.remove('exhausted');
                    playGulpSound();
                    showNotification("Almond Water Diambil: Stamina Penuh!");
                }
            }

            // Cek Koleksi Kunci (Key)
            if (!state.hasKey && state.keyObj) {
                if (camera.position.distanceTo(state.keyObj.position) < 1.5) {
                    state.hasKey = true;
                    mapGroup.remove(state.keyObj);
                    
                    // Buka jalan keluar (Ubah jadi warna hijau)
                    exitMaterial.color.setHex(0x00ff00);
                    state.exitLightObj.color.setHex(0x00ff00);
                    
                    document.getElementById('key-info').innerHTML = 'Kunci: <span style="color:#00ff00">Ditemukan</span>';
                    showNotification("KUNCI DITEMUKAN! Pilar jalan keluar telah terbuka!");
                    playClickSound(); 
                }
            }

            let pGridX = Math.round(camera.position.x / config.tileSize);
            let pGridZ = Math.round(camera.position.z / config.tileSize);
            if (pGridX === state.exitPos.x && pGridZ === state.exitPos.z) {
                if (state.hasKey) {
                    winLevel();
                } else {
                    if(Math.random() < 0.05) showNotification("Jalan Keluar Terkunci! Cari objek Kunci (Kuning) terlebih dahulu.");
                }
            }
        }

        function updateMonster() {
            if (!state.monsterActive || !monster || state.isTransitioning) return; // Monster ikut berhenti

            let dir = new THREE.Vector3();
            dir.subVectors(camera.position, monster.position);
            dir.y = 0; 
            
            let dist = dir.length();
            
            // Tension Overlay Logic (Layar memerah saat monster dekat)
            if (dist < 20) {
                let opacity = 1.0 - (dist / 20);
                tensionOverlay.style.opacity = opacity * 0.85;
            } else {
                tensionOverlay.style.opacity = 0;
            }

            if (dist < 1.5) {
                triggerJumpscare();
                return;
            }

            dir.normalize();
            let nextX = monster.position.x + dir.x * config.monsterSpeed;
            let nextZ = monster.position.z + dir.z * config.monsterSpeed;

            if (!checkCollision(nextX, monster.position.z)) {
                monster.position.x = nextX;
            }
            if (!checkCollision(monster.position.x, nextZ)) {
                monster.position.z = nextZ;
            }

            monster.lookAt(camera.position.x, monster.position.y, camera.position.z);
            
            // Animasi Monster Melayang/Hovering
            monster.children.forEach(child => {
                if (child.userData.baseY !== undefined) {
                    child.position.y = child.userData.baseY + Math.sin(Date.now() * 0.003) * 0.2;
                }
            });
        }

        function updateEnvironment() {
            if (Math.random() < 0.03) {
                ambientLight.intensity = 0.1 + Math.random() * 0.2;
                if(state.flashlight) pointLight.intensity = 0.2 + Math.random() * 0.5;
            } else {
                ambientLight.intensity = 0.4;
                if(state.flashlight) pointLight.intensity = 0.8;
            }

            state.items.forEach(item => {
                item.rotation.y += 0.02;
                item.position.y = 0.4 + Math.sin(Date.now() * 0.005) * 0.05; 
            });

            // Animasi Putaran Kunci
            if (!state.hasKey && state.keyObj) {
                state.keyObj.rotation.y += 0.05;
                state.keyObj.rotation.x += 0.02;
                state.keyObj.position.y = (config.wallHeight / 2) + Math.sin(Date.now() * 0.005) * 0.2;
            }
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (state.isPlaying && !state.isDead) {
                updatePlayer(delta);
                updateMonster();
                updateAudio();
                updateEnvironment(); 
            }

            if(renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
    </script>
</body>
